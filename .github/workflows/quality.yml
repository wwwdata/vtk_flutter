name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  package-web:
    name: Dart, package, and Web
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          pub-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
          package-manager-cache: false

      - name: Verify unpublished package policy
        shell: bash
        run: |
          grep -Eq '^publish_to:[[:space:]]+none[[:space:]]*$' pubspec.yaml
          test ! -e .github/workflows/publish-pub.yml

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          [scriptblock]::Create(
            (Get-Content '.github/scripts/build-native-artifact.ps1' -Raw)
          ) | Out-Null

      - name: Install Dart dependencies
        run: |
          flutter pub get
          flutter pub get --directory example

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run example tests
        run: flutter test
        working-directory: example

      - name: Rebuild committed Web assets
        run: |
          npm ci
          npm test
          npm run build
        working-directory: web

      - name: Verify generated Web assets are current
        run: git diff --exit-code -- assets/

      - name: Build Web example
        run: flutter build web --release
        working-directory: example
