name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6
  VTK_VERSION: 9.5.2

jobs:
  dart-web:
    name: Dart and web
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          pub-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
          package-manager-cache: false

      - name: Install Dart dependencies
        run: |
          flutter pub get
          flutter pub get --directory example

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run example tests
        run: flutter test
        working-directory: example

      - name: Rebuild committed web assets
        run: |
          npm ci
          npm run build
        working-directory: web

      - name: Verify generated web assets are current
        run: git diff --exit-code -- assets/

      - name: Build web example
        run: flutter build web --release
        working-directory: example

  native:
    name: Native shared core (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-15
            run_host_tests: true
          - target: macos-x64
            runner: macos-15-intel
            run_host_tests: true
          - target: ios-arm64
            runner: macos-15
            run_host_tests: false
          - target: ios-simulator-arm64
            runner: macos-15
            run_host_tests: false
          - target: ios-simulator-x64
            runner: macos-15-intel
            run_host_tests: false
          - target: android-arm64
            runner: ubuntu-24.04
            run_host_tests: false
          - target: android-armeabi-v7a
            runner: ubuntu-24.04
            run_host_tests: false
          - target: android-x86_64
            runner: ubuntu-24.04
            run_host_tests: false
          - target: windows-x64
            runner: windows-2025
            run_host_tests: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          pub-cache: true

      - name: Install Android NDK
        if: startsWith(matrix.target, 'android-')
        shell: bash
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/28.2.13676358" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Restore bootstrapped VTK
        id: vtk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .dart_tool/vtk/${{ env.VTK_VERSION }}/${{ matrix.target }}/install
          key: vtk-${{ env.VTK_VERSION }}-${{ matrix.target }}-${{ hashFiles('tool/bootstrap_vtk.dart') }}

      - name: Bootstrap VTK
        if: steps.vtk-cache.outputs.cache-hit != 'true'
        run: dart run tool/bootstrap_vtk.dart --platform ${{ matrix.target }}

      - name: Build monolithic dynamic library
        shell: pwsh
        env:
          RUN_HOST_TESTS: ${{ matrix.run_host_tests }}
        run: |
          $parameters = @{
            Target = '${{ matrix.target }}'
            OutputDirectory = '.dart_tool/quality/${{ matrix.target }}'
          }
          if ($env:RUN_HOST_TESTS -eq 'true') {
            $parameters.RunHostTests = $true
          }
          & .github/scripts/build-native-artifact.ps1 @parameters
